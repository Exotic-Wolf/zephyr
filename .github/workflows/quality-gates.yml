name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  realtime-and-backend:
    name: RTDB Rules + Backend Ledger
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zephyr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/zephyr
      DB_SSL: 'false'
      JWT_SECRET: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: RTDB rules emulator suite
        run: pnpm test:rtdb:rules

      - name: Firestore rules emulator suite
        run: pnpm test:firestore:rules

      - name: Storage rules emulator suite
        run: pnpm test:storage:rules

      - name: Backend unit tests
        run: pnpm --filter zephyr-api test

      - name: Backend e2e tests
        run: pnpm --filter zephyr-api test:e2e

      - name: Backend DB race tests
        run: pnpm --filter zephyr-api test:db:race

      - name: Backend build
        run: pnpm --filter zephyr-api build

  mobile:
    name: Flutter Mobile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Install mobile dependencies
        working-directory: apps/zephyr-mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/zephyr-mobile
        run: flutter analyze

      - name: Flutter tests
        working-directory: apps/zephyr-mobile
        run: flutter test
