openapi: 3.1.0
info:
  title: Zephyr Live Platform API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /v1/auth/google-login:
    post:
      operationId: googleLogin
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '201':
          description: Google session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'

  /v1/auth/apple-login:
    post:
      operationId: appleLogin
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleLoginRequest'
      responses:
        '201':
          description: Apple session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'

  /v1/auth/firebase-token:
    post:
      operationId: createFirebaseToken
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Session-bound Firebase custom token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirebaseTokenResponse'

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Current mobile session revoked

  /v1/users/me:
    get:
      operationId: getMyProfile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      operationId: updateMyProfile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMyProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /v1/rooms:
    get:
      operationId: listLiveRooms
      tags: [Rooms]
      responses:
        '200':
          description: List of current live rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
    post:
      operationId: createRoom
      tags: [Rooms]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'

  /v1/rooms/{roomId}/join:
    post:
      operationId: joinRoom
      tags: [Rooms]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'

  /v1/feed/live:
    get:
      operationId: listLiveFeed
      tags: [Feed]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Swipe-ready list of live room cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiveFeedCard'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required: [id, displayName, isAdmin, isHost, createdAt]
      properties:
        id:
          type: string
          format: uuid
        publicId:
          type: [string, 'null']
        displayName:
          type: string
        avatarUrl:
          type: [string, 'null']
        coverUrl:
          type: [string, 'null']
        bio:
          type: [string, 'null']
        gender:
          type: [string, 'null']
        birthday:
          type: [string, 'null']
        countryCode:
          type: [string, 'null']
        language:
          type: [string, 'null']
        isAdmin:
          type: boolean
        isHost:
          type: boolean
        callRateCoinsPerMinute:
          type: [integer, 'null']
          minimum: 0
        onboardedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time

    Room:
      type: object
      required: [id, hostUserId, title, audienceCount, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        hostUserId:
          type: string
          format: uuid
        title:
          type: string
        audienceCount:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [live]
        createdAt:
          type: string
          format: date-time

    LiveFeedCard:
      type: object
      required:
        [roomId, title, audienceCount, hostUserId, hostDisplayName, hostStatus, startedAt]
      properties:
        roomId:
          type: [string, 'null']
          format: uuid
        title:
          type: string
        audienceCount:
          type: integer
          minimum: 0
        hostUserId:
          type: string
          format: uuid
        hostDisplayName:
          type: string
        hostAvatarUrl:
          type: [string, 'null']
        hostCoverUrl:
          type: [string, 'null']
        hostCountryCode:
          type: [string, 'null']
        hostLanguage:
          type: [string, 'null']
        hostGender:
          type: [string, 'null']
        hostStatus:
          type: string
          enum: [online, away, live, premium_live, busy, offline]
        startedAt:
          type: string
          format: date-time

    AuthLoginResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    FirebaseTokenResponse:
      type: object
      required: [firebaseToken]
      properties:
        firebaseToken:
          type: string

    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        deviceId:
          type: string

    AppleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        givenName:
          type: string
        familyName:
          type: string
        email:
          type: string
        deviceId:
          type: string

    UpdateMyProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: [string, 'null']
        coverUrl:
          type: [string, 'null']
        bio:
          type: [string, 'null']
        gender:
          type: string
        birthday:
          type: string
        countryCode:
          type: string
        language:
          type: string
        callRateCoinsPerMinute:
          type: integer

    CreateRoomRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
